  - id: BAS-005
    title: "Mini-lab: Modeling Chromatin Loops"
    type: workshop
    level: beginner
    category: Foundations
    summary: >-
      Hands-on activity using pipe cleaners and beads to demonstrate how loops
      bring regulatory DNA in contact with genes.
    tags: [Workshop, Beginner, Classroom]
    author: "Helix Learning Lab"
    source: "Helix Learning Lab"
    url: "https://helixlearninglab.org/chromatin-loops"
    language: en
    duration_minutes: 45
    learning_objectives:
      - Explain the role of enhancer-promoter loops.
      - Build a physical model illustrating loop extrusion.

  - id: BAS-006
    title: "Beginner's Guide to Hi-C"
    type: article
    level: beginner
    category: Data-Exploration
    summary: >-
      Step-by-step explanation of how Hi-C data are generated, processed, and
      interpreted, written for researchers new to genome architecture.
    tags: [Hi-C, Beginner Guide]
    author: "Dekker Lab"
    source: "Blog"
    url: "https://dekkerlab.org/resources/beginners-guide-to-hi-c"
    language: en
    prerequisites:
      - Basic molecular biology

