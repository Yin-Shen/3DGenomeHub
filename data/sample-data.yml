resources:
  - id: BAS-001
    title: "Understanding the 3D Genome"
    type: article
    level: beginner
    category: Foundations
    summary: >-
      Plain-language overview explaining why chromosomes fold inside the nucleus,
      how chromatin loops influence gene control, and why 3D genomics matters for
      health research.
    tags: [Chromatin architecture, Beginner]
    author: "Genome Education Alliance"
    source: "Genome.gov"
    url: "https://www.genome.gov/about-genomics/fact-sheets/3d-genome"
    language: en
    learning_objectives:
      - Describe the relationship between DNA packaging and gene regulation.
      - Identify at least three experimental approaches for mapping 3D genomes.

  - id: BAS-002
    title: "Crash Course Genetics: Chromosomes"
    type: video
    level: beginner
    category: Foundations
    summary: >-
      Short animated episode describing how DNA coils into chromosomes and why
      spatial organization matters for gene activity.
    tags: [Video, Beginner, Genetics]
    author: "Crash Course"
    source: "YouTube"
    url: "https://www.youtube.com/watch?v=Ir1GJqjGzNw"
    language: en
    duration_minutes: 12
    learning_objectives:
      - Summarize how DNA packing changes throughout the cell cycle.

