  - id: SKL-101
    title: "Practical Hi-C Data Bootcamp"
    type: course
    level: intermediate
    category: Data-Exploration
    summary: >-
      Two-week online bootcamp introducing quality control, normalization, and
      visualization workflows using open-source tooling.
    tags: [Hi-C, Training, Bootcamp]
    author: "3DGenomics Academy"
    source: "Course Platform"
    url: "https://academy.3dgenomics.org/bootcamp"
    language: en
    duration_minutes: 600
    modules:
      - name: "Module 1: Experiment overview"
        duration_hours: 4
      - name: "Module 2: Mapping and QC"
        duration_hours: 6
      - name: "Module 3: Visualization"
        duration_hours: 5
      - name: "Module 4: Biological interpretation"
        duration_hours: 5
    prerequisites:
      - Introductory genomics
      - Command line basics

